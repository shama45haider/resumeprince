<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoUnit NYC</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f0f14;color:#fff}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:#111;position:sticky;top:0}
.nav-center{position:absolute;left:50%;transform:translateX(-50%)}
.logo{height:32px}
.nav a{color:#aaa;text-decoration:none;font-size:13px}

/* HERO */
.hero{height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;background:#000}
.hero-logo{width:220px;margin-bottom:15px}

.section{padding:40px 20px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.card{background:#17171f;padding:10px;border-radius:10px}
.card img{width:100%}

/* FOOTER (CLEAN REBUILD) */
.footer{
  background:#000;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:15px;
}

.footer-left{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.footer-logo{width:80px}

.footer-right{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.footer-right a{
  font-size:14px;
  color:#aaa;
  text-decoration:none;
}

.footer-right a:hover{color:#fff}

@media(max-width:700px){
  .grid{grid-template-columns:1fr}
  .footer{flex-direction:column;text-align:center}
}
</style>
</head>

<body>

<div class="nav">
  <div><a href="#">SHOP</a></div>
  <div class="nav-center"><img src="logo.png" class="logo"></div>
  <div>🛒</div>
</div>

<div class="hero">
  <div>
    <img src="logo.png" class="hero-logo">
    <h1>THE FUTURE OF STREETWEAR</h1>
  </div>
</div>

<div class="section">
  <h2>NEW ARRIVALS</h2>
  <div class="grid">
    <div class="card"><img src="offwhite.jpg"><p>$950</p></div>
    <div class="card"><img src="chicago.jpg"><p>$180</p></div>
    <div class="card"><img src="balenciaga.jpg"><p>$350</p></div>
  </div>
</div>

<div class="footer">
  <div class="footer-left">
    <img src="logo.png" class="footer-logo">
    <strong>BoUnitNYC</strong>
    <span>support@bounitnyc.com</span>
  </div>

  <div class="footer-right">
    <a href="#">About Us</a>
    <a href="#">Careers</a>
    <a href="#">Terms</a>
    <a href="#">Refund</a>
    <a href="#">Privacy</a>
  </div>
</div>
