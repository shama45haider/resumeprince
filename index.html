<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoUnit NYC</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f0f14;color:#fff}

/* TOP BAR */
.topbar{
  height:36px;
  background:linear-gradient(90deg,#000,#0a0a1a,#000);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

.tick{position:absolute;opacity:0;transition:.5s;font-size:12px;font-weight:600}
.tick.active{opacity:1}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 30px;
  background:rgba(10,10,20,0.85);
  backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:100;
}

.nav-left,.nav-right{display:flex;gap:10px;align-items:center}
.nav-center{position:absolute;left:50%;transform:translateX(-50%)}
.logo{height:38px}

/* NAV LINKS */
.nav a{
  color:#aaa;
  text-decoration:none;
  font-size:12px;
  padding:6px 12px;
  border-radius:8px;
  transition:.25s;
}
.nav a:hover{color:#fff;background:rgba(47,124,255,0.15)}

/* SEARCH */
.search-bar{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;
  padding:6px 10px;
  border-radius:8px;
}

/* CART */
.cart-btn{
  background:linear-gradient(135deg,#2f7cff,#1a4fff);
  padding:6px 14px;
  border-radius:10px;
  display:flex;gap:6px;align-items:center;
}

/* HERO */
.hero{height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;background:#000}

/* SECTION */
.section{padding:40px 20px}

/* ARRIVALS */
.arrivals{display:flex;gap:16px;overflow-x:auto;padding:10px 40px}
.arrival-card{min-width:260px;background:#17171f;border-radius:14px;overflow:hidden}
.arrival-card img{width:100%;height:300px;object-fit:cover}

/* BRANDS */
.brands{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.brand-card img{width:100%;height:120px;object-fit:cover}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tick active">SHOP OUR NEW ARRIVALS</div>
  <div class="tick">FREE SHIPPING ON ORDERS $400+</div>
  <div class="tick">100% AUTHENTIC GUARANTEED</div>
</div>

<!-- NAV -->
<div class="nav">

  <div class="nav-left">
    <a href="#">Shop</a>
    <a href="#">New Arrivals</a>
    <a href="#">Brands</a>
    <a href="#">Trending</a>
    <a href="#">Contact</a>
  </div>

  <div class="nav-center">
    <img src="logo.png" class="logo">
  </div>

  <div class="nav-right">
    <input type="text" id="searchInput" placeholder="Search..." class="search-bar">
    <div class="cart-btn">🛒 Cart</div>
  </div>

</div>

<!-- SHOP BY BRAND -->
<div class="section">
  <h2>SHOP BY BRAND</h2>
  <div class="brands">
    <div class="brand-card"><img src="nike1.png"></div>
    <div class="brand-card"><img src="amiri1.png"></div>
    <div class="brand-card"><img src="chrome1.png"></div>
    <div class="brand-card"><img src="vale1.png"></div>
    <div class="brand-card"><img src="eric1.png"></div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <img src="logo.png" style="width:200px">
    <h1>THE FUTURE OF STREETWEAR</h1>
  </div>
</div>

<!-- NEW ARRIVALS -->
<div class="section">
  <h2>NEW ARRIVALS</h2>

  <div class="arrivals" id="arrivals">

    <div class="arrival-card"><img src="chtrucker.jpeg"><div class="arrival-info">Chrome Hearts Trucker</div></div>
    <div class="arrival-card"><img src="jorts.jpeg"><div class="arrival-info">Denim Jorts</div></div>
    <div class="arrival-card"><img src="flugame.jpeg"><div class="arrival-info">Jordan 12 Flu Game</div></div>
    <div class="arrival-card"><img src="asics.jpeg"><div class="arrival-info">ASICS Runner</div></div>
    <div class="arrival-card"><img src="supreme.jpeg"><div class="arrival-info">Supreme Piece</div></div>

  </div>
</div>

<script>
const ticks=document.querySelectorAll('.tick');
let i=0;
setInterval(()=>{
ticks[i].classList.remove('active');
i=(i+1)%ticks.length;
ticks[i].classList.add('active');
},3000);

document.getElementById('searchInput').addEventListener('input', function(){
  let filter=this.value.toLowerCase();
  document.querySelectorAll('.arrival-card').forEach(card=>{
    card.style.display=card.innerText.toLowerCase().includes(filter)?"block":"none";
  });
});
</script>

</body>
</html>
