<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoUnit NYC</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

html, body{
  height:100%;
}

body{
  background:#0f0f14;
  color:#fff;
  display:flex;
  flex-direction:column;
}

/* TOP BAR */
.topbar{
  height:40px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.tick{
  position:absolute;
  opacity:0;
  transition:.5s;
  font-size:13px;
  font-weight:700;
}
.tick.active{opacity:1}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:#111;
  position:sticky;
  top:0;
}
.nav-center{position:absolute;left:50%;transform:translateX(-50%)}
.logo{height:30px}

/* HERO */
.hero{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero-logo{width:220px}

/* SECTIONS */
.section{padding:40px 20px}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}
.card{
  background:#17171f;
  padding:10px;
  border-radius:10px;
}
.card img{width:100%}

/* FEATURES */
.features{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

/* VIDEOS */
.videos{
  display:grid;
  gap:10px;
}
.video{
  width:100%;
  border:none;
  aspect-ratio:9/16;
}

/* FOOTER */
.footer{
  margin-top:auto;
  background:#000;
  padding:15px 20px 5px;
}

.footer-news{
  text-align:center;
  margin-bottom:10px;
}
.footer-news input{
  padding:8px;
  border:none;
}
.footer-news button{
  padding:8px;
  background:#2f7cff;
  border:none;
  color:#fff;
}

.footer-main{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.footer-left{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.footer-right{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.footer-right a{
  color:#aaa;
  text-decoration:none;
  font-size:14px;
}
.footer-right a:hover{color:#fff}

/* MOBILE */
@media(max-width:700px){
  .grid{grid-template-columns:1fr}
  .footer-main{flex-direction:column;gap:10px;text-align:center}
}
</style>
</head>

<body>

<div class="topbar">
  <div class="tick active">SHOP OUR NEW ARRIVALS</div>
  <div class="tick">FREE SHIPPING OVER $400</div>
</div>

<div class="nav">
  <div>SHOP</div>
  <div class="nav-center"><img src="logo.png" class="logo"></div>
  <div>🛒</div>
</div>

<div class="hero">
  <div>
    <img src="logo.png" class="hero-logo">
    <h1>THE FUTURE OF STREETWEAR</h1>
  </div>
</div>

<div class="section">
<h2>NEW ARRIVALS</h2>
<div class="grid">
<div class="card"><img src="offwhite.jpg"><p>$950</p></div>
<div class="card"><img src="chicago.jpg"><p>$180</p></div>
<div class="card"><img src="balenciaga.jpg"><p>$350</p></div>
</div>
</div>

<div class="section">
<h2>WHY CHOOSE US</h2>
<div class="features">
<div>✔ Authentic</div>
<div>🚚 Fast Shipping</div>
<div>🔄 Returns</div>
<div>🔒 Secure</div>
</div>
</div>

<div class="section">
<h2>VIDEO REVIEWS</h2>
<div class="videos">
<iframe class="video" src="https://www.instagram.com/p/DIuNm-Np_t6/embed"></iframe>
<iframe class="video" src="https://www.instagram.com/p/DM1Ip9xphQs/embed"></iframe>
</div>
</div>

<div class="footer">

<div class="footer-news">
<input placeholder="Email">
<button>Subscribe</button>
</div>

<div class="footer-main">
  <div class="footer-left">
    <strong>BoUnitNYC</strong>
    <span>support@bounitnyc.com</span>
  </div>

  <div class="footer-right">
    <a href="#">About</a>
    <a href="#">Careers</a>
    <a href="#">Terms</a>
    <a href="#">Refund</a>
    <a href="#">Privacy</a>
  </div>
</div>

</div>

<script>
const ticks=document.querySelectorAll('.tick');
let i=0;
setInterval(()=>{
  ticks[i].classList.remove('active');
  i=(i+1)%ticks.length;
  ticks[i].classList.add('active');
},3000);
</script>

</body>
</html>
