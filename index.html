<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoUnit NYC</title>

<style>
:root{
  --blue:#2f7cff;
  --bg:#0f0f14;
  --card:#17171f;
  --text:#ffffff;
  --muted:#9aa0a6;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:var(--bg);color:var(--text)}

/* TOP BAR */
.topbar{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  position:relative;
}
.tick{
  position:absolute;
  font-size:13px;
  font-weight:700;
  letter-spacing:1.5px;
  opacity:0;
  transform:translateY(10px);
  transition:.5s;
  text-shadow:0 0 10px rgba(47,124,255,.7);
}
.tick.active{
  opacity:1;
  transform:translateY(0);
}

/* NAVBAR */
.nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 40px;
  background:rgba(10,10,15,0.75);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.05);
  position:sticky;
  top:0;
  z-index:100;
}
.nav::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(47,124,255,0.6), transparent);
}

.nav-left, .nav-right{
  display:flex;
  align-items:center;
  gap:28px;
}

.nav-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

.logo{
  height:30px;
  filter:drop-shadow(0 0 8px rgba(47,124,255,0.4));
}

.nav a{
  font-size:12px;
  letter-spacing:2px;
  color:rgba(255,255,255,0.6);
  text-decoration:none;
  position:relative;
  transition:.3s;
}
.nav a::after{
  content:"";
  position:absolute;
  bottom:-6px;
  left:0;
  width:0%;
  height:1px;
  background:linear-gradient(90deg, transparent, #2f7cff, transparent);
  transition:.3s;
}
.nav a:hover{color:#fff}
.nav a:hover::after{width:100%}

.nav-icon{
  font-size:18px;
  cursor:pointer;
  transition:.3s;
}
.nav-icon:hover{
  transform:scale(1.15);
  color:var(--blue);
}

/* HERO */
.hero{
  min-height:85vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1528701800489-20be3c2ea9c8?q=80&w=1600') center/cover;
  position:relative;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.75);
}
.hero-content{
  position:relative;
  z-index:2;
}
.hero-logo{
  width:260px;
  max-width:80%;
  margin-bottom:20px;
  filter:drop-shadow(0 0 20px rgba(47,124,255,.4));
}

/* PRODUCTS */
.section{padding:40px 20px}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}
.card{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  position:relative;
}
.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  transition:.3s;
}
.card:hover img{transform:scale(1.05)}
.new{
  position:absolute;
  top:8px;
  left:8px;
  background:var(--blue);
  font-size:10px;
  padding:3px 6px;
}
.actions{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  opacity:0;
}
.card:hover .actions{opacity:1}
.actions button{
  padding:5px 10px;
  border:none;
  font-size:11px;
}
.cart-btn{background:var(--blue);color:#fff}
.view-btn{background:#000;color:#fff}

/* FEATURES */
.features{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}
.feature{
  background:linear-gradient(145deg,#1b1b24,#111);
  padding:20px;
  border-radius:12px;
  text-align:center;
  transition:.3s;
}
.feature:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 30px rgba(47,124,255,.3);
}

/* VIDEOS */
.videos{
  display:grid;
  gap:10px;
}

/* NEWSLETTER */
.newsletter{
  text-align:center;
  background:#000;
  padding:30px;
}

/* CART */
.cart-box{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#111;
  padding:20px;
  transform:translateX(100%);
  transition:.3s;
}
.cart-box.open{transform:translateX(0)}

/* MOBILE */
@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .nav-left{display:none}
  .hero-logo{width:180px}
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tick active">SHOP OUR NEW ARRIVALS</div>
  <div class="tick">FREE SHIPPING ON ALL ORDERS OVER $400</div>
  <div class="tick">100% AUTHENTICITY GUARANTEED</div>
  <div class="tick">NEXT-DAY SHIPPING</div>
</div>

<!-- NAV -->
<div class="nav">
  <div class="nav-left">
    <a href="#">SHOP</a>
    <a href="#">BRANDS</a>
    <a href="#">NEW</a>
  </div>

  <div class="nav-center">
    <img src="logo.png" class="logo">
  </div>

  <div class="nav-right">
    <span class="nav-icon" onclick="toggleCart()">🛒</span>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <img src="logo.png" class="hero-logo">
    <h1>THE FUTURE OF STREETWEAR</h1>
  </div>
</div>

<!-- PRODUCTS -->
<div class="section">
<h2>NEW ARRIVALS</h2><br>
<div class="grid">

<div class="card">
<span class="new">NEW</span>
<img src="offwhite.jpg">
<h4>Off White Jordan 1</h4>
<p>$950</p>
<div class="actions">
<button class="cart-btn" onclick="addToCart('Off White',950)">Add</button>
</div>
</div>

</div>
</div>

<!-- CART -->
<div class="cart-box" id="cart">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<div id="total">Total: $0</div>
</div>

<script>
const ticks=document.querySelectorAll('.tick');
let i=0;
setInterval(()=>{
  ticks[i].classList.remove('active');
  i=(i+1)%ticks.length;
  ticks[i].classList.add('active');
},4000);

let cart=[];
function toggleCart(){
  document.getElementById('cart').classList.toggle('open')
}
function addToCart(name,price){
  const item=cart.find(i=>i.name===name);
  if(item){item.qty++}else{cart.push({name,price,qty:1})}
  renderCart();
}
function renderCart(){
  let total=0;
  const list=document.getElementById('cartItems');
  list.innerHTML='';
  cart.forEach(i=>{
    total+=i.price*i.qty;
    const li=document.createElement('li');
    li.innerText=i.name+' x'+i.qty;
    list.appendChild(li);
  });
  document.getElementById('total').innerText='Total: $'+total;
}
</script>

</body>
</html>
