<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoUnit NYC</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f0f14;color:#fff}

/* TOP BAR */
.topbar{height:40px;background:#000;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.tick{position:absolute;opacity:0;transition:.4s;font-size:13px;font-weight:600}
.tick.active{opacity:1}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:#111;position:sticky;top:0;z-index:10}
.nav-left,.nav-right{display:flex;gap:15px;align-items:center}
.nav-center{position:absolute;left:50%;transform:translateX(-50%)}
.logo{height:40px}
.nav a{color:#aaa;text-decoration:none;font-size:13px}
.nav a:hover{color:#fff}

/* HERO */
.hero{height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;background:#000}
.hero-logo{width:220px;margin-bottom:15px}

.section{padding:40px 20px}

/* ARRIVALS */
.arrivals{display:flex;gap:18px;overflow-x:auto;padding:10px 40px;scroll-behavior:smooth}
.arrivals::-webkit-scrollbar{display:none}

.arrival-card{min-width:260px;background:#17171f;border-radius:14px;overflow:hidden}
.arrival-card video{width:100%;height:240px;object-fit:cover}
.arrival-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 15px 40px rgba(47,124,255,0.25)}

.arrival-info{padding:8px;font-size:13px}

/* FEATURES */
.features{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.feature{background:#17171f;padding:20px;border-radius:14px}

/* VIDEO REVIEWS */
.video-section{position:relative;max-width:1000px;margin:0 auto}
.videos{display:flex;gap:14px;overflow-x:auto;padding:10px 40px}
.videos::-webkit-scrollbar{display:none}
.video-container{min-width:220px;position:relative}
.video{width:100%;height:320px;object-fit:cover;border-radius:12px}
.verified{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.8);padding:6px 10px;border-radius:8px;font-weight:700}

/* BRANDS */
.brands{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.brand-card{position:relative;border-radius:12px;overflow:hidden}
.brand-card img{width:100%;height:120px;object-fit:cover;filter:brightness(.7)}
.brand-card span{position:absolute;bottom:10px;left:10px;font-weight:600}

/* SLIDE BUTTONS */
.slide-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  border:none;
  color:#fff;
  font-size:22px;
  width:40px;
  height:40px;
  border-radius:50%;
  cursor:pointer;
  z-index:10;
}
.slide-btn.left{left:0}
.slide-btn.right{right:0}

/* MOBILE FIX (SAFE) */
@media(max-width:700px){
  .brands{
    display:flex !important;
    overflow-x:auto;
    gap:12px;
    padding:10px;
    scroll-snap-type:x mandatory;
  }
  .brands::-webkit-scrollbar{display:none}
  .brand-card{
    min-width:140px;
    flex:0 0 auto;
    scroll-snap-align:center;
  }
  .features{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tick active">SHOP OUR NEW ARRIVALS</div>
  <div class="tick">FREE SHIPPING ON ORDERS $400+</div>
  <div class="tick">100% AUTHENTIC GUARANTEED</div>
</div>

<!-- NAV -->
<div class="nav">
  <div class="nav-left">
    <a href="#">SHOP</a>
    <a href="#">BRANDS</a>
  </div>
  <div class="nav-center"><img src="logo.png" class="logo"></div>
  <div class="nav-right">🛒</div>
</div>

<!-- SHOP BY BRAND -->
<div class="section">
  <h2 style="margin-bottom:12px">SHOP BY BRAND</h2>

  <div style="position:relative">
    <button class="slide-btn left" onclick="slideBrands(-1)">‹</button>
    <button class="slide-btn right" onclick="slideBrands(1)">›</button>

    <div class="brands" id="brands">
      <div class="brand-card"><img src="nike1.png"><span>Nike</span></div>
      <div class="brand-card"><img src="amiri1.png"><span>Amiri</span></div>
      <div class="brand-card"><img src="chrome1.png"><span>Chrome Hearts</span></div>
      <div class="brand-card"><img src="vale1.png"><span>ValeForever</span></div>
      <div class="brand-card"><img src="eric1.png"><span>Eric Emanuel</span></div>
    </div>
  </div>
</div>

<!-- HERO -->
<div class="hero" style="background:url('background.png') center/cover no-repeat; position:relative;">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,0.75);"></div>
  <div style="position:relative;z-index:2;text-align:center">
    <img src="logo.png" class="hero-logo">
    <h1>THE FUTURE OF STREETWEAR</h1>
  </div>
</div>

<script>
const ticks=document.querySelectorAll('.tick');
let i=0;
setInterval(()=>{
ticks[i].classList.remove('active');
i=(i+1)%ticks.length;
ticks[i].classList.add('active');
},3000);

function slideBrands(dir){
  document.getElementById('brands').scrollBy({left:dir*160,behavior:'smooth'});
}
</script>

</body>
</html>
