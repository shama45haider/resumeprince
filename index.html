<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BoUnit - Coming Soon</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  min-height: 100vh;
  background: url('background.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

/* Grey overlay */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  z-index: 0;
}

.wrapper {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 900px;
  text-align: center;
  padding: 40px 20px;
}

/* Logo (clean, no circle) */
.logo-wrap {
  width: 220px;
  margin: 0 auto 25px;
}

.logo-wrap img {
  width: 100%;
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 0 15px rgba(0,150,255,0.25));
}
  50% { transform: scale(1.05); }
}

.title {
  font-size: 32px;
  font-weight: 600;
  letter-spacing: 2px;
  margin-bottom: 10px;
  opacity: 0.9;
}

.subtitle {
  font-size: 14px;
  opacity: 0.6;
  margin-bottom: 20px;
}

.social {
  font-size: 20px;
  margin-bottom: 40px;
  opacity: 0.9;
}

/* Newsletter Box */
.newsletter {
  background: rgba(0,0,0,0.8);
  padding: 30px;
  border-radius: 8px;
  text-align: left;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.newsletter h3 {
  margin-bottom: 10px;
}

.newsletter p {
  margin-bottom: 20px;
  opacity: 0.7;
}

.form {
  display: flex;
  gap: 10px;
}

.form input {
  flex: 1;
  padding: 14px;
  border: none;
  outline: none;
  font-size: 16px;
}

.form button {
  padding: 14px 25px;
  border: none;
  background: #111;
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(0,150,255,0.5);
  transition: 0.3s;
}

.form button:hover {
  background: #0a0a0a;
  box-shadow: 0 0 25px rgba(0,150,255,0.8);
}

.small {
  font-size: 12px;
  margin-top: 10px;
  opacity: 0.5;
}

/* Particles */
.particles {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  z-index: 1;
}

.particles span {
  position: absolute;
  width: 3px;
  height: 3px;
  background: rgba(0,150,255,0.5);
  border-radius: 50%;
  animation: float 10s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="wrapper">
  
  <div class="logo-wrap">
    <img src="logo.png" alt="BoUnit Logo">
  </div>

  <div class="title">IN PROGRESS...</div>
  <div class="subtitle">GET FUTURE UPDATES THROUGH OUR SOCIALS!</div>
  <div class="social">@BoUnit.104</div>

  <div class="newsletter">
    <h3>NEWSLETTER</h3>
    <p>Sign up to our newsletter to receive exclusive offers.</p>

    <div class="form">
      <input type="email" placeholder="E-mail">
      <button>SUBSCRIBE</button>
    </div>

    <div class="small">By signing up you agree to our policy.</div>
  </div>

</div>

<script>
const container = document.getElementById('particles');
for (let i = 0; i < 50; i++) {
  const span = document.createElement('span');
  span.style.left = Math.random() * 100 + 'vw';
  span.style.animationDuration = (5 + Math.random() * 10) + 's';
  span.style.opacity = Math.random();
  container.appendChild(span);
}
</script>

</body>
</html>
