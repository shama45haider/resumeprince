<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoUnit NYC</title>

<style>
:root{
  --blue:#2f7cff;
  --bg:#0f0f14;
  --card:#17171f;
  --text:#ffffff;
  --muted:#9aa0a6;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:var(--bg);color:var(--text)}

.nav{display:flex;justify-content:space-between;padding:15px 25px;background:#111;position:sticky;top:0}
.nav img{height:40px}

.hero{height:70vh;display:flex;align-items:center;justify-content:center;text-align:center;background:url('https://images.unsplash.com/photo-1528701800489-20be3c2ea9c8?q=80&w=1600') center/cover}
.hero h1{font-size:42px}

.section{padding:40px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.card{background:var(--card);padding:10px;border-radius:10px;position:relative}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover}
.card:hover img{transform:scale(1.08);transition:.3s}

.actions{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;opacity:0}
.card:hover .actions{opacity:1}
.actions button{padding:5px 10px;border:none}

.cart-btn{background:var(--blue);color:#fff}
.view-btn{background:#000;color:#fff}

.cart-box{position:fixed;right:0;top:0;width:280px;height:100%;background:#111;padding:20px;transform:translateX(100%);transition:.3s}
.cart-box.open{transform:translateX(0)}

.total{margin-top:15px;font-weight:bold}

.checkout{margin-top:10px;padding:10px;background:var(--blue);border:none;color:#fff;width:100%}

</style>
</head>

<body>

<div class="nav">
  <img src="logo.png">
  <div onclick="toggleCart()">🛒</div>
</div>

<div class="hero">
  <h1>THE FUTURE OF STREETWEAR</h1>
</div>

<div class="section">
  <h2>NEW ARRIVALS</h2>
  <div class="grid">

    <div class="card">
      <img src="offwhite.jpg">
      <h4>Off White Jordan 1</h4>
      <p>$950</p>
      <div class="actions">
        <button class="cart-btn" onclick="addToCart('Off White',950)">Add</button>
        <button class="view-btn">View</button>
      </div>
    </div>

    <div class="card">
      <img src="chicago.jpg">
      <h4>Jordan 1 Chicago</h4>
      <p>$180</p>
      <div class="actions">
        <button class="cart-btn" onclick="addToCart('Chicago',180)">Add</button>
        <button class="view-btn">View</button>
      </div>
    </div>

  </div>
</div>

<div class="cart-box" id="cart">
  <h3>Cart</h3>
  <ul id="cartItems"></ul>
  <div class="total" id="total">Total: $0</div>
  <button class="checkout" onclick="checkout()">Checkout</button>
</div>

<script>
let cart=[];

function toggleCart(){
  document.getElementById('cart').classList.toggle('open')
}

function addToCart(name,price){
  const existing=cart.find(i=>i.name===name);
  if(existing){existing.qty++}
  else{cart.push({name,price,qty:1})}
  renderCart();
}

function renderCart(){
  const list=document.getElementById('cartItems');
  list.innerHTML='';
  let total=0;

  cart.forEach(item=>{
    total+=item.price*item.qty;
    const li=document.createElement('li');
    li.innerHTML=`${item.name} x${item.qty} - $${item.price*item.qty}`;
    list.appendChild(li);
  });

  document.getElementById('total').innerText='Total: $'+total;
}

function checkout(){
  alert('Stripe checkout coming next');
}
</script>

</body>
</html>
