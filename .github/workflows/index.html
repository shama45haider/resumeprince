<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prince Maldonado | Electrical Technician</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{ --red1:#e5989b; --red2:#ffb4a2; }
body { margin:0; font-family:'Inter',sans-serif; background:#fff5f5; color:#2b2b2b; overflow-x:hidden; }

body::before{ content:""; position:fixed; width:200%; height:200%; top:-50%; left:-50%; background: radial-gradient(circle at 30% 30%, rgba(229,152,155,0.15), transparent), radial-gradient(circle at 70% 70%, rgba(255,180,162,0.15), transparent); animation: floatBG 12s ease-in-out infinite alternate; z-index:-1; }
@keyframes floatBG{ 0%{transform:translate(0,0);} 100%{transform:translate(40px,40px);} }

.header { background:linear-gradient(135deg,var(--red1),var(--red2)); padding:60px 20px; text-align:center; color:white; }
.header h1{ margin-bottom:8px; position:relative; }

.header h1::after{
  content:"";
  display:block;
  width:60px;
  height:3px;
  background:white;
  margin:10px auto 0;
  border-radius:2px;
  animation:expand 1s ease forwards;
}
@keyframes expand{ from{width:0;} to{width:60px;} }

.subtitle{ font-weight:500; opacity:0.95; }
.container{ max-width:1000px; margin:auto; padding:20px; }

.section{ background:white; padding:20px; margin-bottom:20px; border-radius:14px; box-shadow:0 10px 25px rgba(0,0,0,0.05); transform:translateY(40px); opacity:0; transition:all 0.8s ease; position:relative; backdrop-filter: blur(4px); }

.section::before{ content:""; position:absolute; inset:0; border-radius:14px; padding:1px; background:linear-gradient(135deg, rgba(229,152,155,0.4), rgba(255,180,162,0.4)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; opacity:0; transition:0.3s; }
.section:hover::before{ opacity:1; }

.section.visible{ transform:translateY(0); opacity:1; }
.section:hover{ transform:scale(1.02); box-shadow:0 20px 40px rgba(0,0,0,0.1); }

.section h2{ color:var(--red1); margin-bottom:10px; transform:translateX(-10px); opacity:0; transition:0.5s; }
.section.visible h2{ transform:translateX(0); opacity:1; }

.skills{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.skill{ background:#fff1f1; padding:10px; border-radius:10px; transition:0.3s; }
.skill:hover{ transform:translateY(-3px); box-shadow:0 0 12px rgba(229,152,155,0.4); }

.gallery{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }

.work-item{ position:relative; }
.work-item img{ width:100%; height:160px; object-fit:cover; border-radius:10px; transition:0.3s; cursor:pointer; }
.work-item:hover img{ transform:scale(1.05); box-shadow:0 10px 25px rgba(0,0,0,0.15); }

.work-label{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.6);
  color:white;
  font-size:12px;
  padding:6px;
  text-align:center;
  opacity:0;
  border-radius:0 0 10px 10px;
  transition:0.3s;
}
.work-item:hover .work-label{ opacity:1; }

.viewer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.viewer img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

.certs{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
.cert{ background:#fff1f1; border:1px solid rgba(229,152,155,0.4); padding:14px; border-radius:12px; transition:0.25s; }
.cert:hover{ transform:translateY(-4px); box-shadow:0 0 15px rgba(229,152,155,0.5); }

.footer{ text-align:center; padding:20px; color:gray; }

@media (max-width:768px){
  .skills,.certs{ grid-template-columns:1fr; }
  .gallery{ grid-template-columns:1fr 1fr; }
}

@media (max-width:480px){
  .gallery{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="header">
  <h1>Prince Maldonado</h1>
  <div class="subtitle">Electrical Technician | Motor Controls | Systems & Networking</div>
  <p>Brooklyn, NY | (914) 498-4855</p>
</div>

<div class="container">

<div class="section">
<h2>My Work</h2>
<div class="gallery">
<div class="work-item" onclick="openViewer(this)">
<img src="yourimage.jpg">
<div class="work-label">Panel Wiring</div>
</div>
</div>
</div>

</div>

<div class="viewer" id="viewer" onclick="closeViewer()">
<img id="viewerImg">
</div>

<script>
const sections=document.querySelectorAll('.section');
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){entry.target.classList.add('visible');}
});
});
sections.forEach(section=>observer.observe(section));

function openViewer(el){
document.getElementById('viewer').style.display='flex';
document.getElementById('viewerImg').src = el.querySelector('img').src;
}

function closeViewer(){
document.getElementById('viewer').style.display='none';
}
</script>

</body>
</html>
